name: Build APK - WAKE UP Flutter

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Verificar Flutter
        run: flutter --version

      - name: Obtener dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release --no-obfuscate

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: WAKEUP-Flutter-v1
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Info APK
        run: ls -lh build/app/outputs/flutter-apk/
